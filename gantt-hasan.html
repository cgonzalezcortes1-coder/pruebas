<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt · Hasan Estudio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --orange: #fa8408;
  --orange-d: #ff7a17;
  --orange-pale: #fef0e7;
  --orange-border: #ff8403;
  --g900: #1C1C1C;
  --g700: #484848;
  --g500: #8A8A8A;
  --g200: #E4E4E4;
  --g100: #F6F4F0;
  --white: #FFFFFF;
  --r: 10px;
  --shadow: 0 2px 18px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #F4F1EC;
  color: var(--g900);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar {
  background: var(--white);
  border-bottom: 2.5px solid var(--orange);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 14px rgba(250,132,8,0.13);
}
.tb-name {
  font-family: 'DM Serif Display', serif;
  font-size: 21px;
  color: var(--orange);
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.tb-sub {
  font-size: 10px;
  color: var(--g500);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.tb-right {
  margin-left: auto;
  display: flex;
  gap: 10px;
  align-items: center;
}
.tb-italic {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--orange);
  opacity: 0.7;
  margin-right: 8px;
}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 380px 1fr;
  min-height: calc(100vh - 57px);
}

/* ── SIDEBAR ────────────────────────────────────────────────── */
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--g200);
  padding: 24px 20px 80px;
  overflow-y: auto;
  position: relative;
}

.sec-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.2px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title::before {
  content: '';
  width: 18px; height: 2px;
  background: var(--orange);
  border-radius: 2px;
  flex-shrink: 0;
}
.sec-block {
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--g100);
}
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
label {
  font-size: 10px;
  font-weight: 600;
  color: var(--g500);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
input, select {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 8px 10px;
  border: 1.5px solid var(--g200);
  border-radius: 7px;
  color: var(--g900);
  background: var(--white);
  outline: none;
  transition: border-color .18s, box-shadow .18s;
}
input:focus, select:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(250,132,8,.10);
}
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* ── TIPO FECHA ──────────────────────────────────────────────── */
.toggle-row {
  display: flex;
  background: var(--g100);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 14px;
  gap: 2px;
}
.toggle-btn {
  flex: 1;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--g500);
  font-weight: 500;
  transition: all .15s;
}
.toggle-btn.active {
  background: var(--white);
  color: var(--orange-d);
  box-shadow: 0 1px 6px rgba(0,0,0,0.09);
  font-weight: 600;
}

/* ── TASK CARDS ─────────────────────────────────────────────── */
.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

.task-card {
  background: var(--g100);
  border-radius: 9px;
  padding: 12px 14px;
  border: 1.5px solid transparent;
  transition: border-color .15s, opacity .15s;
  position: relative;
}
.task-card:hover { border-color: var(--orange-border); }
.task-card.dragging { opacity: 0.35; border-color: var(--orange-border); }
.task-card.drag-over-top {
  border-top: 2.5px solid var(--orange);
  margin-top: -1px;
}
.task-card.drag-over-bottom {
  border-bottom: 2.5px solid var(--orange);
  margin-bottom: -1px;
}

.task-drag-handle {
  cursor: grab;
  color: var(--g500);
  font-size: 15px;
  line-height: 1;
  padding: 0 3px 0 0;
  flex-shrink: 0;
  opacity: 0.4;
  transition: opacity .15s;
  user-select: none;
}
.task-card:hover .task-drag-handle { opacity: 0.8; }
.task-drag-handle:active { cursor: grabbing; }

.task-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.task-color-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid rgba(0,0,0,0.12);
  cursor: pointer;
}
.task-name-input {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  border: none;
  background: transparent;
  color: var(--g900);
  padding: 2px 4px;
  border-radius: 4px;
  border-bottom: 1.5px solid var(--g200);
}
.task-name-input:focus {
  outline: none;
  border-bottom-color: var(--orange);
  box-shadow: none;
}
.task-del {
  width: 22px; height: 22px;
  border: none;
  background: rgba(192,57,43,0.10);
  color: #C0392B;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .12s;
}
.task-del:hover { background: #C0392B; color: white; }

.task-range {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.task-range label {
  font-size: 9px;
  margin-bottom: 2px;
}
.task-range input, .task-range select {
  font-size: 11.5px;
  padding: 5px 7px;
  background: var(--white);
}

.task-type-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.type-btn {
  padding: 4px 10px;
  border: 1.5px solid var(--g200);
  border-radius: 12px;
  background: var(--white);
  cursor: pointer;
  font-size: 10.5px;
  color: var(--g700);
  font-family: 'DM Sans', sans-serif;
  transition: all .12s;
}
.type-btn.active {
  border-color: var(--orange);
  background: var(--orange-pale);
  color: var(--orange-d);
  font-weight: 600;
}

/* Window duration */
.window-dur-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-top: 8px;
}
.window-dur-wrap label {
  font-size: 10px;
  font-weight: 600;
  color: var(--g500);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
}
.window-days-input {
  width: 62px;
  padding: 5px 8px;
  font-size: 12px;
}
.window-dur-unit {
  font-size: 11px;
  color: var(--g500);
}

/* Note field */
.task-note-wrap {
  margin-top: 8px;
}
.task-note-toggle {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 10.5px;
  color: var(--g500);
  font-family: 'DM Sans', sans-serif;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color .12s;
}
.task-note-toggle:hover { color: var(--orange); }
.task-note-toggle .note-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--orange);
}
.task-note-input {
  width: 100%;
  margin-top: 6px;
  border: 1.5px solid var(--g200);
  border-radius: 7px;
  padding: 5px 9px;
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  color: var(--g700);
  background: var(--white);
  outline: none;
  transition: border-color .12s;
}
.task-note-input:focus { border-color: var(--orange); }

/* Stage rows */
.stages-container {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-top: 4px;
}
.stage-row {
  border: 1px solid var(--g200);
  border-radius: 7px;
  padding: 7px 10px 9px;
  background: var(--white);
}
.stage-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.stage-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--orange-d);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stage-remove {
  width: 16px; height: 16px;
  border: none;
  background: rgba(192,57,43,0.10);
  color: #C0392B;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  padding: 0; line-height: 1;
}
.stage-remove:hover { background: #C0392B; color: white; }
.btn-add-stage {
  width: 100%;
  padding: 5px;
  border: 1.5px dashed var(--g200);
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 10.5px;
  color: var(--g500);
  transition: all .13s;
  margin-top: 2px;
}
.btn-add-stage:hover { border-color: var(--orange-border); color: var(--orange-d); }

/* Notes panel below canvas */
#notes-panel {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: 10px;
}
.note-entry {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: 11px;
  color: var(--g700);
  font-family: 'DM Sans', sans-serif;
}
.note-entry-marker {
  font-weight: 700;
  flex-shrink: 0;
}

/* Color picker popup */
.color-popup {
  position: absolute;
  z-index: 100;
  background: var(--white);
  border: 1.5px solid var(--g200);
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  width: 170px;
}
.color-popup.open { display: flex; }
.cp-swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: transform .1s, border-color .1s;
}
.cp-swatch:hover { transform: scale(1.15); }
.cp-swatch.sel { border-color: var(--g700); }

/* ── ADD TASK BUTTON ────────────────────────────────────────── */
.btn-add-task {
  width: 100%;
  padding: 9px;
  border: 2px dashed var(--orange-border);
  border-radius: 7px;
  background: transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  color: var(--orange-d);
  transition: all .13s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn-add-task:hover { background: var(--orange-pale); border-color: var(--orange); }

/* ── PDF BUTTON ─────────────────────────────────────────────── */
.btn-pdf {
  padding: 10px 20px;
  background: var(--orange);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 3px 14px rgba(250,132,8,.35);
  display: flex; align-items: center; gap: 6px;
}
.btn-pdf:hover { background: var(--orange-d); transform: translateY(-1px); }
.btn-pdf:disabled { opacity: .6; cursor: not-allowed; transform: none; }

/* ── PREVIEW AREA ───────────────────────────────────────────── */
.preview-area {
  padding: 28px 32px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.preview-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--g500);
  display: flex;
  align-items: center;
  gap: 10px;
}
.preview-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--g200);
}

/* ── GANTT PREVIEW (canvas container) ──────────────────────── */
#gantt-wrap {
  background: var(--white);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: auto;
  border: 1px solid rgba(250,132,8,0.12);
  max-width: 100%;
  scrollbar-width: thin;
  scrollbar-color: var(--orange-border) transparent;
}
#gantt-wrap::-webkit-scrollbar { height: 6px; width: 6px; }
#gantt-wrap::-webkit-scrollbar-track { background: transparent; }
#gantt-wrap::-webkit-scrollbar-thumb { background: var(--orange-border); border-radius: 3px; }
#gantt-wrap::-webkit-scrollbar-thumb:hover { background: var(--orange); }
#gantt-canvas {
  display: block;
}

/* ── TOAST ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--g900); color: white;
  padding: 11px 18px; border-radius: 8px;
  font-size: 13px; opacity: 0;
  transform: translateY(8px);
  transition: all .25s; z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { background: #237A47; }
.toast.err { background: #B71C1C; }

@media(max-width:768px){
  .app { grid-template-columns: 1fr; }
  .preview-area { padding: 16px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="tb-name">HASAN</div>
    <div class="tb-sub">Gantt</div>
  </div>
  <div class="tb-right">
    <span class="tb-italic">escuchar es mirar.</span>
    <button class="btn-pdf" id="btn-pdf" onclick="generatePDF()">⬇ Exportar PDF</button>
  </div>
</div>

<div class="app">

  <!-- ── SIDEBAR ──────────────────────────────────────────────── -->
  <div class="sidebar">

    <!-- PROYECTO -->
    <div class="sec-block">
      <div class="sec-title">Proyecto</div>
      <div class="field">
        <label>Título del proyecto</label>
        <input type="text" id="f-title" placeholder="Ej: Jackson C. Frank: Here Come the Blues" oninput="renderGantt()">
      </div>
      <div class="field">
        <label>Subtítulo / Productora <span style="opacity:.5;font-weight:400">(opcional)</span></label>
        <input type="text" id="f-subtitle" placeholder="Ej: A24 Films" oninput="renderGantt()">
      </div>
    </div>

    <!-- FECHAS -->
    <div class="sec-block">
      <div class="sec-title">Fechas</div>
      <div class="toggle-row">
        <button class="toggle-btn active" id="mode-weeks" onclick="setDateMode('weeks')">Solo semanas</button>
        <button class="toggle-btn" id="mode-dates" onclick="setDateMode('dates')">Fechas reales</button>
      </div>

      <div id="sec-weeks">
        <div class="field">
          <label>Número de semanas</label>
          <input type="number" id="f-numweeks" value="8" min="1" max="24" oninput="rebuildWeekSelects();renderGantt()">
        </div>
        <div class="field">
          <label>Etiqueta de semanas</label>
          <select id="f-weeklabel" onchange="renderGantt()">
            <option value="Week">Week</option>
            <option value="WEEK">WEEK</option>
            <option value="Semana">Semana</option>
            <option value="Wk">Wk</option>
          </select>
        </div>
      </div>

      <div id="sec-dates" style="display:none">
        <div class="field">
          <label>Fecha de inicio</label>
          <input type="date" id="f-startdate" oninput="renderGantt()">
        </div>
        <div class="field">
          <label>Número de semanas</label>
          <input type="number" id="f-numweeks2" value="8" min="1" max="24" oninput="rebuildWeekSelects();renderGantt()">
        </div>
      </div>
    </div>

    <!-- TAREAS -->
    <div class="sec-block">
      <div class="sec-title">Tareas</div>
      <div class="task-list" id="task-list"></div>
      <button class="btn-add-task" onclick="addTask()">＋ Agregar tarea</button>
    </div>

  </div>

  <!-- ── PREVIEW ──────────────────────────────────────────────── -->
  <div class="preview-area">
    <div class="preview-label">Vista previa</div>
    <div id="gantt-wrap">
      <canvas id="gantt-canvas"></canvas>
    </div>
    <div id="notes-panel"></div>
    <p style="font-size:11px;color:var(--g500);text-align:center;margin-top:8px">
      El PDF se exporta en A4 horizontal con el branding de Hasan Estudio
    </p>
  </div>

</div>

<!-- Color popup (shared, moved via JS) -->
<div class="color-popup" id="color-popup"></div>

<div class="toast" id="toast"></div>

<script>
// ── PALETA ────────────────────────────────────────────────────
const PALETTE = [
  '#4CAF50','#8BC34A','#CDDC39',
  '#FFEB3B','#FFC107','#FF9800',
  '#FF5722','#F44336','#E91E63',
  '#9C27B0','#673AB7','#3F51B5',
  '#2196F3','#03A9F4','#00BCD4',
  '#009688','#795548','#607D8B',
  '#F5A623','#00E5FF',
];

const TASK_COLORS = [
  '#00C853','#FFD600','#FF6D00',
  '#AA00FF','#2979FF','#00B0FF',
  '#F5A623','#E53935','#00BFA5',
  '#6200EA',
];

// ── STATE ─────────────────────────────────────────────────────
let dateMode = 'weeks';
let taskId = 0;
let tasks = [];
let dragSrcId = null;

// ── DATE MODE ─────────────────────────────────────────────────
function setDateMode(m) {
  dateMode = m;
  document.getElementById('mode-weeks').classList.toggle('active', m==='weeks');
  document.getElementById('mode-dates').classList.toggle('active', m==='dates');
  document.getElementById('sec-weeks').style.display = m==='weeks' ? '' : 'none';
  document.getElementById('sec-dates').style.display = m==='dates' ? '' : 'none';
  renderGantt();
}

// ── GET WEEKS COUNT ───────────────────────────────────────────
function getNumWeeks() {
  const id = dateMode === 'weeks' ? 'f-numweeks' : 'f-numweeks2';
  return parseInt(document.getElementById(id)?.value || 8);
}

// ── ADD TASK ─────────────────────────────────────────────────
function addTask(name='', color='', startDay=1, endDay=7, type='bar') {
  const id = ++taskId;
  const col = color || TASK_COLORS[(tasks.length) % TASK_COLORS.length];
  const obj = { id, name, color: col, type, note: '', stages: [{ startDay, endDay }], windowDays: 5 };
  tasks.push(obj);
  renderTaskCard(obj);
  renderGantt();
}

// Add by week range (more natural)
function addTaskW(name, color, sw, sd, ew, ed, type='bar') {
  addTask(name, color, (sw-1)*7+sd, (ew-1)*7+ed, type);
}

// Rebuild week selects when numWeeks changes
function rebuildWeekSelects() {
  const maxDay = getNumWeeks() * 7;
  tasks.forEach(t => {
    // Recorta los días de cada stage al nuevo rango antes de reconstruir
    // los selects, para que el estado interno quede siempre consistente.
    t.stages.forEach(stage => {
      if (stage.endDay > maxDay) {
        stage.endDay   = maxDay;
        stage.endWeek  = Math.ceil(maxDay / 7);
        stage.endDow   = ((maxDay - 1) % 7) + 1;
      }
      if (stage.startDay > maxDay) {
        stage.startDay  = maxDay;
        stage.startWeek = Math.ceil(maxDay / 7);
        stage.startDow  = ((maxDay - 1) % 7) + 1;
      }
      if (stage.startDay > stage.endDay) stage.startDay = stage.endDay;
    });
    (t._stageSels || []).forEach(ss => {
      if (ss.swSel) ss.swSel.rebuild();
      if (ss.ewSel) ss.ewSel.rebuild();
    });
  });
}

function renderTaskCard(t) {
  const list = document.getElementById('task-list');

  const card = document.createElement('div');
  card.className = 'task-card';
  card.id = 'tc-'+t.id;

  // ── Header ────────────────────────────────────────────────
  const hdr = document.createElement('div');
  hdr.className = 'task-card-header';

  const handle = document.createElement('div');
  handle.className = 'task-drag-handle';
  handle.innerHTML = '⠿';
  handle.title = 'Arrastrar para reordenar';

  const dot = document.createElement('div');
  dot.className = 'task-color-dot';
  dot.style.background = t.color;
  dot.onclick = (e) => openColorPicker(e, t.id);

  const nameI = document.createElement('input');
  nameI.className = 'task-name-input';
  nameI.type = 'text';
  nameI.placeholder = 'Nombre de la tarea';
  nameI.value = t.name;
  nameI.oninput = () => { t.name = nameI.value; renderGantt(); };

  const delBtn = document.createElement('button');
  delBtn.className = 'task-del';
  delBtn.innerHTML = '×';
  delBtn.onclick = () => {
    tasks = tasks.filter(x => x.id !== t.id);
    card.remove();
    renderGantt();
  };

  hdr.append(handle, dot, nameI, delBtn);

  // ── Drag & Drop ───────────────────────────────────────────
  card.draggable = true;

  card.addEventListener('dragstart', (e) => {
    dragSrcId = t.id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });

  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.task-card').forEach(c => {
      c.classList.remove('drag-over-top', 'drag-over-bottom');
    });
  });

  card.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (dragSrcId === t.id) return;
    e.dataTransfer.dropEffect = 'move';
    const rect = card.getBoundingClientRect();
    const mid  = rect.top + rect.height / 2;
    document.querySelectorAll('.task-card').forEach(c => {
      c.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    card.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
  });

  card.addEventListener('dragleave', (e) => {
    if (!card.contains(e.relatedTarget)) {
      card.classList.remove('drag-over-top', 'drag-over-bottom');
    }
  });

  card.addEventListener('drop', (e) => {
    e.preventDefault();
    if (dragSrcId === t.id) return;

    const rect    = card.getBoundingClientRect();
    const dropTop = e.clientY < rect.top + rect.height / 2;

    const srcIdx = tasks.findIndex(x => x.id === dragSrcId);
    let   dstIdx = tasks.findIndex(x => x.id === t.id);
    if (srcIdx === -1 || dstIdx === -1) return;

    // Remove source and insert at the right position
    const [moved] = tasks.splice(srcIdx, 1);
    dstIdx = tasks.findIndex(x => x.id === t.id);
    tasks.splice(dropTop ? dstIdx : dstIdx + 1, 0, moved);

    // Reorder DOM
    const list    = document.getElementById('task-list');
    const srcCard = document.getElementById('tc-' + moved.id);
    if (dropTop) {
      card.before(srcCard);
    } else {
      card.after(srcCard);
    }

    document.querySelectorAll('.task-card').forEach(c => {
      c.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    renderGantt();
  });

  // ── Stages (multi-segment ranges) ─────────────────────────
  const DAY_NAMES = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const dayToWD = d => ({ w: Math.ceil(d/7), dow: ((d-1)%7)+1 });
  const wdToDay = (w, dow) => (w-1)*7 + dow;

  const stagesContainer = document.createElement('div');
  stagesContainer.className = 'stages-container';
  t._stageSels = [];

  function refreshStages() {
    stagesContainer.innerHTML = '';
    t._stageSels = [];

    t.stages.forEach((stage, si) => {
      const wd0 = dayToWD(stage.startDay);
      const wd1 = dayToWD(stage.endDay);
      stage.startWeek = wd0.w;  stage.startDow = wd0.dow;
      stage.endWeek   = wd1.w;  stage.endDow   = wd1.dow;

      const mkWeekSel = (val, onChange) => {
        const wrap = document.createElement('div');
        const l = document.createElement('label'); l.textContent = 'Semana';
        const sel = document.createElement('select');
        sel.style.cssText = 'font-size:11.5px;padding:5px 7px;background:var(--white)';
        const rebuild = () => {
          const cur = parseInt(sel.value) || val;
          sel.innerHTML = '';
          for (let i=1; i<=getNumWeeks(); i++) {
            const o = document.createElement('option');
            o.value = i; o.textContent = `Sem ${i}`;
            if (i === cur) o.selected = true;
            sel.appendChild(o);
          }
        };
        rebuild();
        sel.oninput = () => { onChange(parseInt(sel.value)); renderGantt(); };
        sel._rebuild = rebuild;
        wrap.append(l, sel);
        return { wrap, sel, rebuild };
      };

      const mkDaySel = (val, onChange) => {
        const wrap = document.createElement('div');
        const l = document.createElement('label'); l.textContent = 'Día';
        const sel = document.createElement('select');
        sel.style.cssText = 'font-size:11.5px;padding:5px 7px;background:var(--white)';
        DAY_NAMES.forEach((d,i) => {
          const o = document.createElement('option');
          o.value = i+1; o.textContent = d;
          if (i+1 === val) o.selected = true;
          sel.appendChild(o);
        });
        sel.oninput = () => { onChange(parseInt(sel.value)); renderGantt(); };
        wrap.append(l, sel);
        return { wrap, sel };
      };

      const sw = mkWeekSel(stage.startWeek, v => {
        stage.startWeek = v;
        stage.startDay  = wdToDay(v, stage.startDow);
        if (stage.startDay > stage.endDay) {
          stage.endWeek = v; stage.endDow = stage.startDow;
          stage.endDay  = stage.startDay;
          ew.sel.value = v; ed.sel.value = stage.startDow;
        }
      });
      const sd = mkDaySel(stage.startDow, v => {
        stage.startDow = v;
        stage.startDay = wdToDay(stage.startWeek, v);
        if (stage.startDay > stage.endDay) {
          stage.endWeek = stage.startWeek; stage.endDow = v;
          stage.endDay  = stage.startDay;
          ew.sel.value = stage.startWeek; ed.sel.value = v;
        }
      });
      const ew = mkWeekSel(stage.endWeek, v => {
        stage.endWeek = v;
        stage.endDay  = wdToDay(v, stage.endDow);
        if (stage.endDay < stage.startDay) {
          stage.startWeek = v; stage.startDow = stage.endDow;
          stage.startDay  = stage.endDay;
          sw.sel.value = v; sd.sel.value = stage.endDow;
        }
      });
      const ed = mkDaySel(stage.endDow, v => {
        stage.endDow = v;
        stage.endDay = wdToDay(stage.endWeek, v);
        if (stage.endDay < stage.startDay) {
          stage.startWeek = stage.endWeek; stage.startDow = v;
          stage.startDay  = stage.endDay;
          sw.sel.value = stage.endWeek; sd.sel.value = v;
        }
      });

      t._stageSels.push({ swSel: sw, ewSel: ew });

      // Stage header
      const stageHdr = document.createElement('div');
      stageHdr.className = 'stage-header';
      const stageLbl = document.createElement('span');
      stageLbl.className = 'stage-label';
      stageLbl.textContent = t.stages.length > 1 ? `Seg ${si + 1}` : 'Rango';
      stageHdr.appendChild(stageLbl);
      if (t.stages.length > 1) {
        const removeBtn = document.createElement('button');
        removeBtn.className = 'stage-remove';
        removeBtn.innerHTML = '×';
        removeBtn.onclick = () => { t.stages.splice(si, 1); refreshStages(); renderGantt(); };
        stageHdr.appendChild(removeBtn);
      }

      // Selectors layout
      const iLbl = document.createElement('div');
      iLbl.style.cssText = 'font-size:9px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px';
      iLbl.textContent = 'Inicio';
      const fLbl = document.createElement('div');
      fLbl.style.cssText = 'font-size:9px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;margin-top:4px';
      fLbl.textContent = 'Fin';
      const sg = document.createElement('div');
      sg.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:6px';
      sg.append(sw.wrap, sd.wrap);
      const eg = document.createElement('div');
      eg.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:6px';
      eg.append(ew.wrap, ed.wrap);
      const stageBody = document.createElement('div');
      stageBody.style.cssText = 'display:flex;flex-direction:column;gap:0';
      stageBody.append(iLbl, sg, fLbl, eg);

      const stageRow = document.createElement('div');
      stageRow.className = 'stage-row';
      stageRow.append(stageHdr, stageBody);
      stagesContainer.appendChild(stageRow);
    });

    // Add segment button
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add-stage';
    addBtn.innerHTML = '＋ Agregar segmento';
    addBtn.onclick = () => {
      const totalDays = getNumWeeks() * 7;
      const last      = t.stages[t.stages.length - 1];
      // Empezar justo después del segmento anterior, sin solapar ni retroceder.
      const newStart = Math.min(last.endDay + 1, totalDays);
      const newEnd   = Math.min(newStart + 6,    totalDays);
      t.stages.push({ startDay: newStart, endDay: newEnd });
      refreshStages();
      renderGantt();
    };
    stagesContainer.appendChild(addBtn);
  }

  refreshStages();

  // ── Type ──────────────────────────────────────────────────
  const typeRow = document.createElement('div');
  typeRow.className = 'task-type-row';

  const mkType = (lbl, val) => {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (t.type===val ? ' active' : '');
    btn.textContent = lbl;
    btn.onclick = () => {
      t.type = val;
      typeRow.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGantt();
    };
    return btn;
  };

  typeRow.append(
    mkType('▬ Barra', 'bar'),
    mkType('◆ Evento', 'milestone'),
    mkType('▭ Ventana', 'window'),
  );

  // ── Window duration ───────────────────────────────────────
  const windowDurWrap = document.createElement('div');
  windowDurWrap.className = 'window-dur-wrap';
  windowDurWrap.style.display = t.type === 'window' ? 'flex' : 'none';

  const wdLabel = document.createElement('label');
  wdLabel.textContent = 'Duración';
  const wdInput = document.createElement('input');
  wdInput.type = 'number';
  wdInput.min = 1;
  wdInput.value = t.windowDays || 5;
  wdInput.className = 'window-days-input';
  wdInput.oninput = () => {
    t.windowDays = Math.max(1, parseInt(wdInput.value) || 1);
    renderGantt();
  };
  const wdUnit = document.createElement('span');
  wdUnit.className = 'window-dur-unit';
  wdUnit.textContent = 'días';
  windowDurWrap.append(wdLabel, wdInput, wdUnit);

  // Show/hide windowDurWrap when type changes
  typeRow.querySelectorAll('.type-btn').forEach(btn => {
    const origClick = btn.onclick;
    btn.onclick = (e) => {
      origClick && origClick(e);
      windowDurWrap.style.display = t.type === 'window' ? 'flex' : 'none';
    };
  });

  // ── Note ──────────────────────────────────────────────────
  const noteWrap = document.createElement('div');
  noteWrap.className = 'task-note-wrap';

  const noteToggle = document.createElement('button');
  noteToggle.className = 'task-note-toggle';
  noteToggle.innerHTML = t.note ? '✎ Nota <span class="note-dot"></span>' : '✎ Agregar nota';

  const noteField = document.createElement('input');
  noteField.className = 'task-note-input';
  noteField.type = 'text';
  noteField.placeholder = 'Nota breve para esta sección…';
  noteField.value = t.note || '';
  noteField.style.display = t.note ? 'block' : 'none';
  noteField.oninput = () => {
    t.note = noteField.value;
    noteToggle.innerHTML = t.note ? '✎ Nota <span class="note-dot"></span>' : '✎ Agregar nota';
    renderGantt();
  };

  noteToggle.onclick = () => {
    const open = noteField.style.display === 'block';
    noteField.style.display = open ? 'none' : 'block';
    if (!open) noteField.focus();
  };

  noteWrap.append(noteToggle, noteField);
  card.append(hdr, stagesContainer, typeRow, windowDurWrap, noteWrap);
  list.appendChild(card);
}

// ── COLOR PICKER ──────────────────────────────────────────────
function openColorPicker(e, tid) {
  e.stopPropagation();
  const popup = document.getElementById('color-popup');

  popup.innerHTML = '';
  PALETTE.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'cp-swatch';
    sw.style.background = col;
    const t = tasks.find(x=>x.id===tid);
    if (t && t.color === col) sw.classList.add('sel');
    sw.onclick = (ev) => {
      ev.stopPropagation();
      applyColor(tid, col);
      popup.classList.remove('open');
    };
    popup.appendChild(sw);
  });

  const rect = e.target.getBoundingClientRect();
  popup.style.left = (rect.left + window.scrollX) + 'px';
  popup.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
  popup.classList.add('open');
}

function applyColor(tid, col) {
  const t = tasks.find(x=>x.id===tid);
  if (!t) return;
  t.color = col;
  const card = document.getElementById('tc-'+tid);
  if (card) card.querySelector('.task-color-dot').style.background = col;
  renderGantt();
}

document.addEventListener('click', () => {
  document.getElementById('color-popup').classList.remove('open');
});

// ── RENDER GANTT (canvas) ─────────────────────────────────────
function renderGantt() {
  const canvas = document.getElementById('gantt-canvas');
  drawGantt(canvas, getGanttData(), 1);
  renderNotes();
  saveState();
}

// ── PERSIST STATE ─────────────────────────────────────────────
function saveState() {
  try {
    const state = {
      title:     document.getElementById('f-title')?.value    || '',
      subtitle:  document.getElementById('f-subtitle')?.value || '',
      dateMode,
      startDate: document.getElementById('f-startdate')?.value  || '',
      numWeeks:  document.getElementById('f-numweeks')?.value   || '8',
      numWeeks2: document.getElementById('f-numweeks2')?.value  || '8',
      weekLabel: document.getElementById('f-weeklabel')?.value  || 'Week',
      tasks: tasks.map(({ name, color, type, note, stages, windowDays }) => ({
        name, color, type, note, windowDays,
        stages: (stages || []).map(({ startDay, endDay }) => ({ startDay, endDay }))
      }))
    };
    localStorage.setItem('gantt-hasan', JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('gantt-hasan');
    if (!raw) return false;
    const s = JSON.parse(raw);

    // Restore form fields first so week selects build with the right numWeeks
    if (s.title     !== undefined) document.getElementById('f-title').value     = s.title;
    if (s.subtitle  !== undefined) document.getElementById('f-subtitle').value  = s.subtitle;
    if (s.startDate)               document.getElementById('f-startdate').value = s.startDate;
    if (s.numWeeks)                document.getElementById('f-numweeks').value  = s.numWeeks;
    if (s.numWeeks2)               document.getElementById('f-numweeks2').value = s.numWeeks2;
    if (s.weekLabel)               document.getElementById('f-weeklabel').value = s.weekLabel;

    // Restore dateMode UI without triggering renderGantt
    if (s.dateMode) {
      dateMode = s.dateMode;
      document.getElementById('mode-weeks').classList.toggle('active', s.dateMode === 'weeks');
      document.getElementById('mode-dates').classList.toggle('active', s.dateMode === 'dates');
      document.getElementById('sec-weeks').style.display = s.dateMode === 'weeks' ? '' : 'none';
      document.getElementById('sec-dates').style.display = s.dateMode === 'dates' ? '' : 'none';
    }

    // Restore tasks
    if (s.tasks?.length) {
      s.tasks.forEach(td => {
        const id = ++taskId;
        const obj = {
          id,
          name:       td.name       || '',
          color:      td.color      || '#4CAF50',
          type:       td.type       || 'bar',
          note:       td.note       || '',
          windowDays: td.windowDays || 5,
          stages:     td.stages?.length ? td.stages : [{ startDay: 1, endDay: 7 }]
        };
        tasks.push(obj);
        renderTaskCard(obj);
      });
    }
    return true;
  } catch(e) {
    return false;
  }
}

function renderNotes() {
  const panel = document.getElementById('notes-panel');
  panel.innerHTML = '';
  const noted = tasks.filter(t => t.note && t.note.trim() !== '');
  noted.forEach((t, i) => {
    const entry = document.createElement('div');
    entry.className = 'note-entry';
    const marker = document.createElement('span');
    marker.className = 'note-entry-marker';
    marker.style.color = t.color;
    marker.textContent = '*';
    const text = document.createElement('span');
    text.textContent = (t.name || '—') + ' — ' + t.note.trim();
    entry.append(marker, text);
    panel.appendChild(entry);
  });
}

function getGanttData() {
  const title    = document.getElementById('f-title')?.value?.trim() || 'Proyecto';
  const subtitle = document.getElementById('f-subtitle')?.value?.trim() || '';
  const nw       = getNumWeeks();
  const wkLabel  = document.getElementById('f-weeklabel')?.value || 'Week';
  const startDate = dateMode === 'dates'
    ? document.getElementById('f-startdate')?.value
    : null;

  // Build day labels
  const DAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const totalDays = nw * 7;
  const dayLabels = [];
  const weekStarts = []; // {col, label}

  for (let w=0; w<nw; w++) {
    weekStarts.push({ col: w*7, label: `${wkLabel} ${w+1}` });
    for (let d=0; d<7; d++) {
      const dayIdx = w*7+d;
      if (startDate) {
        const dt = new Date(startDate + 'T12:00:00');
        dt.setDate(dt.getDate() + dayIdx);
        const mn = dt.toLocaleString('en-US',{month:'short'});
        dayLabels.push(`${mn} ${dt.getDate()}`);
      } else {
        dayLabels.push(DAYS[d]);
      }
    }
  }

  return { title, subtitle, nw, totalDays, dayLabels, weekStarts, tasks };
}

// ── DRAW ENGINE ───────────────────────────────────────────────
function drawGantt(canvas, data, scale) {
  const { title, subtitle, nw, totalDays, dayLabels, weekStarts, tasks } = data;

  // Dimensions
  const LABEL_W  = 190;
  const DAY_W    = 28;
  const WEEK_H   = 22;
  const DAY_H    = 20;
  const ROW_H    = 32;
  const HEADER_H = WEEK_H + DAY_H;
  const TITLE_H  = 50;

  const TW_full = LABEL_W + totalDays * DAY_W;
  const TH_full = TITLE_H + HEADER_H + tasks.length * ROW_H + 20;

  // Use devicePixelRatio for crisp rendering but keep CSS size = logical size
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = TW_full * dpr;
  canvas.height = TH_full * dpr;
  canvas.style.width  = TW_full + 'px';
  canvas.style.height = TH_full + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const TW = TW_full;
  const TH = TH_full;

  // Background
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, TW, TH);

  // ── TITLE AREA ────────────────────────────────────────────
  ctx.fillStyle = '#fa8408';
  ctx.fillRect(0, 0, TW, TITLE_H);

  // Title text
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 15px "DM Sans", sans-serif';
  ctx.fillText(title, 20, 22);
  if (subtitle) {
    ctx.font = '11px "DM Sans", sans-serif';
    ctx.globalAlpha = 0.8;
    ctx.fillText(subtitle, 20, 38);
    ctx.globalAlpha = 1;
  }
  // HASAN label (right)
  ctx.font = 'bold 14px "DM Serif Display", serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'right';
  ctx.fillText('HASAN', TW - 14, 22);
  ctx.font = '9px "DM Sans", sans-serif';
  ctx.fillText('ESTUDIO', TW - 14, 34);
  ctx.textAlign = 'left';

  // ── WEEK HEADER ───────────────────────────────────────────
  const wy = TITLE_H;
  weekStarts.forEach((ws, wi) => {
    const x = LABEL_W + ws.col * DAY_W;
    const nextX = wi+1 < weekStarts.length
      ? LABEL_W + weekStarts[wi+1].col * DAY_W
      : LABEL_W + totalDays * DAY_W;
    const bgColors = [
      '#D9EAD3','#FFF2CC','#FCE5CD','#D9D2E9',
      '#CFE2F3','#F4CCCC','#D9EAD3','#FFF2CC'
    ];
    ctx.fillStyle = bgColors[wi % bgColors.length];
    ctx.fillRect(x, wy, nextX - x, WEEK_H);
    ctx.fillStyle = '#484848';
    ctx.font = 'bold 10px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ws.label, x + (nextX-x)/2, wy + 14);
    ctx.textAlign = 'left';
  });

  // ── DAY HEADER ────────────────────────────────────────────
  const dy = TITLE_H + WEEK_H;
  dayLabels.forEach((lbl, i) => {
    const x = LABEL_W + i * DAY_W;
    const isWeekend = (i % 7 === 5 || i % 7 === 6);
    ctx.fillStyle = isWeekend ? '#ECECEC' : '#F8F6F2';
    ctx.fillRect(x, dy, DAY_W, DAY_H);
    ctx.fillStyle = isWeekend ? '#AAAAAA' : '#666666';
    ctx.font = `${isWeekend?'normal':'500'} 8px "DM Sans", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(lbl, x + DAY_W/2, dy + 13);
    ctx.textAlign = 'left';
  });

  // Vertical grid lines (week separators)
  ctx.strokeStyle = 'rgba(250,132,8,0.30)';
  ctx.lineWidth = 1;
  weekStarts.forEach(ws => {
    const x = LABEL_W + ws.col * DAY_W;
    ctx.beginPath();
    ctx.moveTo(x, TITLE_H);
    ctx.lineTo(x, TH);
    ctx.stroke();
  });

  // ── TASK ROWS ─────────────────────────────────────────────
  tasks.forEach((task, ti) => {
    const ry = TITLE_H + HEADER_H + ti * ROW_H;

    // Row background
    ctx.fillStyle = ti % 2 === 0 ? '#FFFFFF' : '#FAFAF8';
    ctx.fillRect(0, ry, TW, ROW_H);

    // Horizontal separator
    ctx.strokeStyle = '#EEEBE5';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, ry + ROW_H);
    ctx.lineTo(TW, ry + ROW_H);
    ctx.stroke();

    // Label
    ctx.fillStyle = '#333333';
    ctx.font = '11px "DM Sans", sans-serif';
    ctx.textAlign = 'left';
    // Truncate label (reserve space for * if note exists)
    const hasNote = task.note && task.note.trim() !== '';
    const maxLblW = LABEL_W - 20 - (hasNote ? 10 : 0);
    let lbl = task.name || '—';
    while (ctx.measureText(lbl).width > maxLblW && lbl.length > 3) {
      lbl = lbl.slice(0,-1);
    }
    if (lbl !== task.name) lbl += '…';
    ctx.fillText(lbl, 14, ry + ROW_H/2 + 4);
    // Draw * marker if note exists
    if (hasNote) {
      const lblW = ctx.measureText(lbl).width;
      ctx.fillStyle = task.color;
      ctx.font = 'bold 11px "DM Sans", sans-serif';
      ctx.fillText('*', 14 + lblW + 3, ry + ROW_H/2 + 4);
      ctx.fillStyle = '#333333';
      ctx.font = '11px "DM Sans", sans-serif';
    }

    // Weekend shading on row
    for (let i=0; i<totalDays; i++) {
      if (i % 7 === 5 || i % 7 === 6) {
        ctx.fillStyle = 'rgba(0,0,0,0.025)';
        ctx.fillRect(LABEL_W + i*DAY_W, ry, DAY_W, ROW_H);
      }
    }

    // ── BAR or MILESTONE ─────────────────────────────────────
    (task.stages || [{ startDay: task.startDay, endDay: task.endDay }]).forEach(stage => {
    const s = Math.max(0, stage.startDay - 1); // 0-indexed
    const e = Math.min(totalDays - 1, stage.endDay - 1);

    if (task.type === 'milestone') {
      // Diamond
      const mx = LABEL_W + s * DAY_W + DAY_W/2;
      const my = ry + ROW_H/2;
      const ms = 7;
      ctx.fillStyle = task.color;
      ctx.beginPath();
      ctx.moveTo(mx, my - ms);
      ctx.lineTo(mx + ms, my);
      ctx.lineTo(mx, my + ms);
      ctx.lineTo(mx - ms, my);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (task.type === 'window') {
      const bx  = LABEL_W + s * DAY_W;
      const bw  = (e - s + 1) * DAY_W;
      const bh  = 16;
      const by  = ry + (ROW_H - bh)/2;
      const rad = 5;
      const [cr,cg,cb] = hexToRgb(task.color);

      // Outer hollow bar — very light fill + dashed border
      ctx.fillStyle = `rgba(${cr},${cg},${cb},0.08)`;
      roundRect(ctx, bx, by, bw, bh, rad);
      ctx.fill();

      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = task.color;
      ctx.lineWidth = 1.5;
      roundRect(ctx, bx, by, bw, bh, rad);
      ctx.stroke();
      ctx.setLineDash([]);

      // Inner mini-bar centered
      const wd = task.windowDays || 5;
      const windowRange = e - s + 1;
      const miniW = Math.max(DAY_W, Math.min(wd / windowRange, 1) * bw);
      const miniX = bx + (bw - miniW) / 2;
      const miniBh = 8;
      const miniBy = by + (bh - miniBh) / 2;

      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 3;
      ctx.shadowOffsetY = 1;
      ctx.fillStyle = task.color;
      roundRect(ctx, miniX, miniBy, miniW, miniBh, 3);
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // Duration label inside mini-bar
      if (miniW >= 22) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px "DM Sans", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`${wd}d`, miniX + miniW / 2, miniBy + miniBh / 2 + 3);
        ctx.textAlign = 'left';
      }
    } else {
      // Skip weekend days for visual - draw segments between weekends
      const bx  = LABEL_W + s * DAY_W;
      const bw  = (e - s + 1) * DAY_W;
      const bh  = 16;
      const by  = ry + (ROW_H - bh)/2;
      const rad = 5;

      // Shadow
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 1;

      // Fill
      ctx.fillStyle = task.color;
      roundRect(ctx, bx, by, bw, bh, rad);
      ctx.fill();

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // Draw bar in segments, skipping weekends (which get grey fill)
      // First draw grey blocks for every weekend day in range
      for (let i=s; i<=e; i++) {
        if (i % 7 === 5 || i % 7 === 6) {
          const wx = LABEL_W + i * DAY_W;
          // grey fill clipped to bar height
          ctx.fillStyle = '#E0DDD8';
          ctx.fillRect(wx, by, DAY_W, bh);
        }
      }
      // Re-draw rounded border on top so corners look clean
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 0.5;
      roundRect(ctx, bx, by, bw, bh, rad);
      ctx.stroke();
    }
    }); // stages
  });

  // ── LEFT BORDER ───────────────────────────────────────────
  ctx.strokeStyle = '#fa8408';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, TH);
  ctx.stroke();

  // ── RIGHT/BOTTOM BORDER ───────────────────────────────────
  ctx.strokeStyle = '#E4E4E4';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(0, 0, TW, TH);

  // ── LABEL / GRID DIVIDER ─────────────────────────────────
  ctx.strokeStyle = 'rgba(250,132,8,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(LABEL_W, TITLE_H);
  ctx.lineTo(LABEL_W, TH);
  ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── PDF GENERATION ────────────────────────────────────────────
async function generatePDF() {
  const btn = document.getElementById('btn-pdf');
  btn.disabled = true;
  btn.textContent = '⏳ Generando...';
  try {
    await buildPDF();
    toast('✓ PDF generado correctamente', 'ok');
  } catch(e) {
    toast('Error: ' + e.message, 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⬇ Exportar PDF';
  }
}

async function buildPDF() {
  const { jsPDF } = window.jspdf;

  const data = getGanttData();

  // ── Layout constants (page size adapts to content) ────────
  const MARGIN  = 12;
  const TITLE_H = 18;
  const WEEK_H  = 8;
  const DAY_H   = 7;
  const HDR_H   = WEEK_H + DAY_H;
  const ROW_H   = 10;          // comfortable fixed row height
  const DAY_W   = 5.5;         // mm per day column — same ratio as the preview

  const LABEL_W   = 50;
  const GRID_W    = data.totalDays * DAY_W;
  const CONTENT_W = LABEL_W + GRID_W;

  // Bar heights proportional to row
  const BAR_H     = ROW_H * 0.58;
  const MINIBAR_H = ROW_H * 0.30;
  const MS_SIZE   = ROW_H * 0.32;

  // Page dimensions derived from content
  const noted = data.tasks.filter(t => t.note && t.note.trim() !== '');
  const NOTES_H = noted.length > 0 ? 8 + noted.length * 6 : 0;
  const PW = MARGIN * 2 + CONTENT_W;
  const PH = MARGIN * 2 + TITLE_H + 4 + HDR_H + data.tasks.length * ROW_H + 10 + NOTES_H;

  // jsPDF normalizes custom formats to [short, long], so pass [PH, PW] + landscape
  // and it will swap them → page ends up PW wide × PH tall
  const doc = new jsPDF({ unit: 'mm', format: [PH, PW], orientation: 'landscape' });

  const TITLE_Y = MARGIN;
  const HDR_Y   = TITLE_Y + TITLE_H + 4;
  const BODY_Y  = HDR_Y + HDR_H;

  const OR = [245, 166, 35];
  const WH = [255, 255, 255];
  const GR = [72, 72, 72];
  const LG = [160, 160, 160];

  // ── TITLE BAR ─────────────────────────────────────────────
  doc.setFillColor(...OR);
  doc.rect(MARGIN, TITLE_Y, CONTENT_W, TITLE_H, 'F');

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(...WH);
  doc.text(data.title, MARGIN + 6, TITLE_Y + 11);

  if (data.subtitle) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(255, 235, 180);
    doc.text(data.subtitle, MARGIN + 6, TITLE_Y + 16);
  }

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(255, 255, 255, 0.5);
  doc.setGState(doc.GState({opacity:0.5}));
  doc.text('HASAN', PW - MARGIN - 2, TITLE_Y + 8, { align: 'right' });
  doc.setFontSize(6.5);
  doc.text('ESTUDIO', PW - MARGIN - 2, TITLE_Y + 14, { align: 'right' });
  doc.setGState(doc.GState({opacity:1}));

  // ── WEEK HEADERS ──────────────────────────────────────────
  const weekBgColors = [
    [217,234,211],[255,242,204],[252,229,205],[217,210,233],
    [207,226,243],[244,204,204],[217,234,211],[255,242,204],
  ];

  data.weekStarts.forEach((ws, wi) => {
    const x  = MARGIN + LABEL_W + ws.col * DAY_W;
    const nw = wi + 1 < data.weekStarts.length
      ? data.weekStarts[wi+1].col * DAY_W
      : data.totalDays * DAY_W;
    const prevW = ws.col * DAY_W;
    const bw = nw - prevW;

    const bg = weekBgColors[wi % weekBgColors.length];
    doc.setFillColor(...bg);
    doc.rect(x, HDR_Y, bw, WEEK_H, 'F');

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(6.5);
    doc.setTextColor(...GR);
    doc.text(ws.label, x + bw/2, HDR_Y + 5.5, { align: 'center' });
  });

  // ── DAY HEADERS ───────────────────────────────────────────
  data.dayLabels.forEach((lbl, i) => {
    const x = MARGIN + LABEL_W + i * DAY_W;
    const isWE = (i % 7 === 5 || i % 7 === 6);
    doc.setFillColor(...(isWE ? [232,232,232] : [248,246,242]));
    doc.rect(x, HDR_Y + WEEK_H, DAY_W, DAY_H, 'F');
    doc.setFont('helvetica', isWE ? 'normal' : '500');
    doc.setFontSize(5.5);
    doc.setTextColor(...(isWE ? [170,170,170] : [100,100,100]));
    doc.text(lbl, x + DAY_W/2, HDR_Y + WEEK_H + 4.8, { align: 'center' });
  });

  // ── TASK ROWS ─────────────────────────────────────────────
  data.tasks.forEach((task, ti) => {
    const ry = BODY_Y + ti * ROW_H;

    // Row bg
    doc.setFillColor(...(ti%2===0 ? WH : [250,250,248]));
    doc.rect(MARGIN, ry, CONTENT_W, ROW_H, 'F');

    // Row separator
    doc.setDrawColor(235, 232, 228);
    doc.setLineWidth(0.2);
    doc.line(MARGIN, ry + ROW_H, MARGIN + CONTENT_W, ry + ROW_H);

    // Weekend shading
    for (let i=0; i<data.totalDays; i++) {
      if (i % 7 === 5 || i % 7 === 6) {
        doc.setFillColor(0, 0, 0, 0.03);
        doc.setGState(doc.GState({opacity:0.04}));
        doc.rect(MARGIN + LABEL_W + i * DAY_W, ry, DAY_W, ROW_H, 'F');
        doc.setGState(doc.GState({opacity:1}));
      }
    }

    // Label
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(...GR);
    const hasNote = task.note && task.note.trim() !== '';
    let lbl = task.name || '—';
    while (doc.getTextWidth(lbl) > LABEL_W - 4 - (hasNote ? 4 : 0) && lbl.length > 2) lbl = lbl.slice(0,-1);
    if (lbl !== task.name) lbl += '…';
    doc.text(lbl, MARGIN + 2, ry + ROW_H/2 + 1.8);
    if (hasNote) {
      const lblW = doc.getTextWidth(lbl);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(...hexToRgb(task.color));
      doc.text('*', MARGIN + 2 + lblW + 1.5, ry + ROW_H/2 + 1.8);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(...GR);
    }

    // Bar / Milestone
    const col = hexToRgb(task.color);
    (task.stages || [{ startDay: task.startDay, endDay: task.endDay }]).forEach(stage => {
    const s = Math.max(0, stage.startDay - 1);
    const e = Math.min(data.totalDays - 1, stage.endDay - 1);

    if (task.type === 'milestone') {
      const mx = MARGIN + LABEL_W + s * DAY_W + DAY_W/2;
      const my = ry + ROW_H/2;
      const ms = MS_SIZE;
      doc.setFillColor(...col);
      doc.lines([[ms,-ms],[ms,ms],[-ms,ms],[-ms,-ms]], mx, my - ms, [1,1], 'F');
    } else if (task.type === 'window') {
      const bx = MARGIN + LABEL_W + s * DAY_W;
      const bw = (e - s + 1) * DAY_W;
      const bh = BAR_H;
      const by = ry + (ROW_H - bh)/2;

      // Outer hollow bar — very light fill + dashed stroke
      doc.setGState(doc.GState({opacity: 0.08}));
      doc.setFillColor(...col);
      doc.roundedRect(bx, by, bw, bh, 1.2, 1.2, 'F');
      doc.setGState(doc.GState({opacity: 1}));

      doc.setDrawColor(...col);
      doc.setLineWidth(0.4);
      doc.setLineDashPattern([1.2, 0.9], 0);
      doc.roundedRect(bx, by, bw, bh, 1.2, 1.2, 'S');
      doc.setLineDashPattern([], 0);

      // Inner mini-bar centered
      const wd = task.windowDays || 5;
      const windowRange = e - s + 1;
      const miniW = Math.max(DAY_W, Math.min(wd / windowRange, 1) * bw);
      const miniX = bx + (bw - miniW) / 2;
      const miniBh = MINIBAR_H;
      const miniBy = by + (bh - miniBh) / 2;

      doc.setFillColor(...col);
      doc.roundedRect(miniX, miniBy, miniW, miniBh, 0.8, 0.8, 'F');

      // Duration label inside mini-bar
      if (miniW >= 7) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(4.5);
        doc.setTextColor(255, 255, 255);
        doc.text(`${wd}d`, miniX + miniW / 2, miniBy + miniBh / 2 + 1.4, { align: 'center' });
      }
    } else {
      const bx = MARGIN + LABEL_W + s * DAY_W;
      const bw = (e - s + 1) * DAY_W;
      const bh = BAR_H;
      const by = ry + (ROW_H - bh)/2;

      doc.setFillColor(...col);
      doc.roundedRect(bx, by, bw, bh, 1.2, 1.2, 'F');

      // Grey out weekend days inside the bar
      for (let i=s; i<=e; i++) {
        if (i % 7 === 5 || i % 7 === 6) {
          const wx = MARGIN + LABEL_W + i * DAY_W;
          doc.setFillColor(220, 217, 212);
          doc.rect(wx, by, DAY_W, bh, 'F');
        }
      }
    }
    }); // stages
  });

  // ── GRID LINES ────────────────────────────────────────────
  doc.setDrawColor(245, 166, 35, 0.3);
  doc.setLineWidth(0.3);
  data.weekStarts.forEach(ws => {
    const x = MARGIN + LABEL_W + ws.col * DAY_W;
    doc.line(x, HDR_Y, x, BODY_Y + data.tasks.length * ROW_H);
  });

  // ── OUTER BORDER ─────────────────────────────────────────
  doc.setDrawColor(...OR);
  doc.setLineWidth(0.8);
  doc.line(MARGIN, TITLE_Y, MARGIN, BODY_Y + data.tasks.length * ROW_H);

  doc.setDrawColor(200, 200, 200);
  doc.setLineWidth(0.3);
  doc.rect(MARGIN, TITLE_Y, CONTENT_W, TITLE_H + 4 + HDR_H + data.tasks.length * ROW_H);

  // ── LABEL / GRID DIVIDER ─────────────────────────────────
  doc.setDrawColor(245, 166, 35, 0.3);
  doc.setLineWidth(0.4);
  doc.line(
    MARGIN + LABEL_W, HDR_Y,
    MARGIN + LABEL_W, BODY_Y + data.tasks.length * ROW_H
  );

  // ── NOTES ────────────────────────────────────────────────
  if (noted.length) {
    const NOTE_Y = BODY_Y + data.tasks.length * ROW_H + 6;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(...LG);
    doc.text('Notas', MARGIN, NOTE_Y);
    noted.forEach((t, i) => {
      const ny = NOTE_Y + 6 + i * 6;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(...hexToRgb(t.color));
      doc.text('*', MARGIN, ny);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(...GR);
      doc.text(`${t.name || '—'} — ${t.note.trim()}`, MARGIN + 4, ny);
    });
  }

  // ── FOOTER ────────────────────────────────────────────────
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(6.5);
  doc.setTextColor(...LG);
  doc.text('www.hasanestudio.net', PW/2, PH - 6, { align: 'center' });
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7);
  doc.setTextColor(200, 160, 80);
  doc.setGState(doc.GState({opacity:0.4}));
  doc.text('escuchar es mirar.', PW/2, PH - 10, { align: 'center' });
  doc.setGState(doc.GState({opacity:1}));

  // ── SAVE ─────────────────────────────────────────────────
  const safeName = (data.title || 'gantt').replace(/[^\w\sáéíóúñÁÉÍÓÚÑ]/g,'_');
  doc.save(`Gantt_Hasan_${safeName}.pdf`);
}

// Convierte '#RRGGBB' a [r, g, b]. Devuelve gris neutro si el valor es inválido.
function hexToRgb(hex) {
  if (!hex || !/^#[0-9A-Fa-f]{6}$/.test(hex)) return [128, 128, 128];
  return [
    parseInt(hex.slice(1, 3), 16),
    parseInt(hex.slice(3, 5), 16),
    parseInt(hex.slice(5, 7), 16),
  ];
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3500);
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Default date (may be overwritten by loadState)
  const today = new Date();
  document.getElementById('f-startdate').value = today.toISOString().slice(0,10);

  if (!loadState()) {
    // No saved state → load example tasks
    addTaskW('Dialog Editing',       '#4CAF50', 1,1, 5,5);
    addTaskW('Foley Editing',        '#FFD600', 1,1, 5,5);
    addTaskW('Backgrounds Editing',  '#FF9800', 1,1, 5,5);
    addTaskW('Sound Effects Editing','#AA00FF', 1,1, 5,5);
    addTaskW('Premix',               '#00BCD4', 6,1, 7,3);
    addTaskW('Final Mix',            '#E53935', 7,4, 8,3);
  }

  renderGantt();
});
